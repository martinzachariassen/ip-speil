[tools]
bun = "1.3"

# Thin wrappers over the package.json scripts so `mise run <task>` works too.
[tasks.dev]
description = "Build the client and run the dev server (watch)"
run = "bun run dev"

[tasks.build]
description = "Bundle the client TypeScript to public/assets/js"
run = "bun run build"

[tasks.typecheck]
description = "Strict TypeScript typecheck (server + client)"
run = "bun run typecheck"

[tasks.lint]
description = "Lint + format check with Biome"
run = "bun run lint"

[tasks.test]
description = "Run the test suite"
run = "bun test"

[tasks.check]
description = "Build, typecheck, lint, and test (run before finishing)"
run = "bun run check"
