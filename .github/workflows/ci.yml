name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the check job only needs to read the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. a force-push to an open PR).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Bundles the client, typechecks server + client, lints, and runs tests.
      - name: Check
        run: bun run check
