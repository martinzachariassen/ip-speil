name: Scorecard

# OpenSSF Scorecard — grades the repo's supply-chain posture (branch
# protection, token permissions, pinned dependencies, dangerous workflows)
# and publishes the results to the Security tab and the public Scorecard API.
on:
  # Re-run when a branch protection rule changes (Scorecard reads them).
  branch_protection_rule:
  schedule:
    # Weekly, Monday 08:00 UTC.
    - cron: "0 8 * * 1"
  push:
    branches: [main]

# Top-level least privilege; the analysis job elevates only what it needs.
permissions: read-all

concurrency:
  group: scorecard-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload SARIF to the Security tab
      id-token: write # publish results to the Scorecard API
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
