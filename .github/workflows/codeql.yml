name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, so newly-published CodeQL queries catch regressions even
    # without a push. Monday 07:00 UTC.
    - cron: "0 7 * * 1"

# Cancel superseded runs on the same ref.
concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload results to the Security tab
      actions: read # required by CodeQL on private repos; harmless on public

    steps:
      - uses: actions/checkout@v7

      # Interpreted language: no build step, so autobuild/manual build is skipped.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript"
