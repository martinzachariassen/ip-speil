version: 2

updates:
  # Runtime + dev dependencies (Bun reads package.json / bun.lock via the npm ecosystem).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    # One PR per week per group instead of a flood of single-package PRs.
    groups:
      production:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      dev:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  # The GitHub Actions used by the workflows in this repo.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      actions:
        patterns:
          - "*"

  # The oven/bun base image in the Dockerfile.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "docker"
